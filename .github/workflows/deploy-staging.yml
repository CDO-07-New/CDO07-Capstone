name: deploy-staging

on:
  push:
    branches:
      - develop
      - main
  repository_dispatch:
    types:
      - ai_image_published
  workflow_dispatch:
    inputs:
      ai_image_uri:
        description: Immutable AI image URI from TF4-AIO-03-foresight-lens-final, e.g. ECR repo@sha256:digest
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: staging
  PROJECT_DIR: xbrain-learners/capstone/tf-4/cdo-07
  CDO_SERVICES: ingest-service ingest-worker
  AI_IMAGE_URI: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ai_image_uri || github.event_name == 'workflow_dispatch' && inputs.ai_image_uri || vars.STAGING_AI_IMAGE_URI }}

jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Validate deployment prerequisites
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          terraform_root="${PROJECT_DIR}/infra/environments/${ENVIRONMENT}"
          if [[ ! -d "$terraform_root" ]] || ! find "$terraform_root" -maxdepth 1 -type f -name '*.tf' | grep -q .; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Staging deploy skipped::${terraform_root} does not exist yet. Add Terraform runtime infrastructure to enable deployment."
            {
              echo "## Staging deploy skipped"
              echo ""
              echo "Missing Terraform root: \`${terraform_root}\`"
              echo ""
              echo "This is expected until the runtime ECS/Terraform environment is added."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "deploy_ready=true" >> "$GITHUB_OUTPUT"

      - name: Build window-feeder Lambda package
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          lambda_dir="${PROJECT_DIR}/infra/lambda/window-feeder"
          package_dir="${lambda_dir}/build/package"
          rm -rf "${lambda_dir}/build"
          mkdir -p "$package_dir"
          python3 -m pip install --quiet requests -t "$package_dir"
          cp "${lambda_dir}/app.py" "$package_dir/"
          (cd "$package_dir" && zip -qr ../window-feeder.zip .)

      - name: Build CDO service images and compose manifest
        if: steps.preflight.outputs.deploy_ready == 'true'
        id: images
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          manifest="${RUNNER_TEMP}/image-manifest.json"
          echo '{}' > "$manifest"

          for service in ${CDO_SERVICES}; do
            service_dir="${PROJECT_DIR}/services/${service}"
            repository="tf4-cdo07-${service}"
            image_uri="${ECR_REGISTRY}/${repository}:${GITHUB_SHA}"

            if [[ ! -f "${service_dir}/Dockerfile" ]]; then
              echo "::notice title=Image build skipped::${service_dir}/Dockerfile does not exist yet."
              continue
            fi

            docker build --tag "$image_uri" "$service_dir"
            docker push "$image_uri"

            digest="$(aws ecr describe-images \
              --repository-name "$repository" \
              --image-ids "imageTag=${GITHUB_SHA}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"

            jq --arg service "$service" \
              --arg image "${ECR_REGISTRY}/${repository}@${digest}" \
              '. + {($service): $image}' "$manifest" > "${manifest}.tmp"
            mv "${manifest}.tmp" "$manifest"
          done

          if [[ -n "${AI_IMAGE_URI}" ]]; then
            if [[ "${AI_IMAGE_URI}" != *@sha256:* ]]; then
              echo "::error title=Invalid AI image URI::Use an immutable ECR digest URI like repo@sha256:digest."
              exit 1
            fi

            jq --arg image "${AI_IMAGE_URI}" \
              '. + {"ai-serving": $image}' "$manifest" > "${manifest}.tmp"
            mv "${manifest}.tmp" "$manifest"
          elif [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            echo "::error title=AI image missing::repository_dispatch must include client_payload.ai_image_uri."
            exit 1
          else
            echo "::notice title=AI image missing::Provide workflow input ai_image_uri or repository variable STAGING_AI_IMAGE_URI to deploy the external AI engine image."
          fi

          echo "manifest_path=${manifest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Staging image digest manifest"
            echo ""
            echo '```json'
            jq . "$manifest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staging image manifest
        if: steps.preflight.outputs.deploy_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: staging-image-manifest-${{ github.sha }}
          path: ${{ steps.images.outputs.manifest_path }}
          if-no-files-found: error

      - name: Terraform apply staging
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          terraform_root="${PROJECT_DIR}/infra/environments/${ENVIRONMENT}"
          terraform -chdir="$terraform_root" init -input=false
          terraform -chdir="$terraform_root" apply -input=false -auto-approve

      - name: Deploy ingest-service rolling update
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="$(jq -r '."ingest-service" // empty' '${{ steps.images.outputs.manifest_path }}')"
          if [[ -z "$image" ]]; then
            echo "::notice title=ingest-service image missing::No image digest was produced; skipping service deployment."
            exit 0
          fi
          "${PROJECT_DIR}/scripts/deploy-ecs-rolling.sh" \
            "${ENVIRONMENT}" \
            "ingest-service" \
            "$image"

      - name: Deploy ingest-worker rolling update
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="$(jq -r '."ingest-worker" // empty' '${{ steps.images.outputs.manifest_path }}')"
          if [[ -z "$image" ]]; then
            echo "::notice title=ingest-worker image missing::No image digest was produced; skipping service deployment."
            exit 0
          fi
          "${PROJECT_DIR}/scripts/deploy-ecs-rolling.sh" \
            "${ENVIRONMENT}" \
            "ingest-worker" \
            "$image"

      - name: Deploy ai-serving blue/green
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        env:
          ECS_CLUSTER: ${{ env.ENVIRONMENT }}-tf-4-aiops-cluster
          ECS_SERVICE_NAME: foresight-lens-engine
          CONTAINER_NAME: foresight-lens-engine
          CONTAINER_PORT: '8080'
          CODEDEPLOY_APP: tf4-cdo07-${{ env.ENVIRONMENT }}-foresight-lens-engine
          CODEDEPLOY_GROUP: tf4-cdo07-${{ env.ENVIRONMENT }}-foresight-lens-engine
        run: |
          set -euo pipefail
          image="$(jq -r '."ai-serving" // empty' '${{ steps.images.outputs.manifest_path }}')"
          if [[ -z "$image" ]]; then
            echo "::notice title=AI image missing::No external AI image URI was provided; skipping AI engine deployment."
            exit 0
          fi
          "${PROJECT_DIR}/scripts/deploy-codedeploy-bluegreen.sh" \
            "${ENVIRONMENT}" \
            "ai-serving" \
            "$image"

      - name: Smoke test staging
        if: steps.preflight.outputs.deploy_ready == 'true'
        shell: bash
        env:
          BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: "${PROJECT_DIR}/scripts/smoke-test.sh"
