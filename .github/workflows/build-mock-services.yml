name: Build & Push Mock Services

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build (or all)'
        required: true
        type: choice
        options:
          - all
          - payment-gw
          - ledger-svc
          - fraud-detection
  push:
    branches:
      - develop
      - main
    paths:
      - 'xbrain-learners/capstone/tf-4/cdo-07/mock-services/**'
      - '.github/workflows/build-mock-services.yml'
  pull_request:
    paths:
      - 'xbrain-learners/capstone/tf-4/cdo-07/mock-services/**'

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      payment-gw: ${{ steps.filter.outputs.payment-gw || steps.manual.outputs.payment-gw }}
      ledger-svc: ${{ steps.filter.outputs.ledger-svc || steps.manual.outputs.ledger-svc }}
      fraud-detection: ${{ steps.filter.outputs.fraud-detection || steps.manual.outputs.fraud-detection }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Manual trigger selection
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "payment-gw" ]; then
            echo "payment-gw=true" >> $GITHUB_OUTPUT
          else
            echo "payment-gw=false" >> $GITHUB_OUTPUT
          fi
          
          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "ledger-svc" ]; then
            echo "ledger-svc=true" >> $GITHUB_OUTPUT
          else
            echo "ledger-svc=false" >> $GITHUB_OUTPUT
          fi
          
          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "fraud-detection" ]; then
            echo "fraud-detection=true" >> $GITHUB_OUTPUT
          else
            echo "fraud-detection=false" >> $GITHUB_OUTPUT
          fi
      
      - uses: dorny/paths-filter@v2
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            payment-gw:
              - 'xbrain-learners/capstone/tf-4/cdo-07/mock-services/payment-gw/**'
            ledger-svc:
              - 'xbrain-learners/capstone/tf-4/cdo-07/mock-services/ledger-svc/**'
            fraud-detection:
              - 'xbrain-learners/capstone/tf-4/cdo-07/mock-services/fraud-detection/**'

  build-payment-gw:
    name: Build Payment Gateway
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.payment-gw == 'true' && 
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names payment-gw --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name payment-gw --region ${{ env.AWS_REGION }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xbrain-learners/capstone/tf-4/cdo-07/mock-services/payment-gw
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/payment-gw:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/payment-gw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ledger-svc:
    name: Build Ledger Service
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.ledger-svc == 'true' && 
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ledger-svc --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ledger-svc --region ${{ env.AWS_REGION }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xbrain-learners/capstone/tf-4/cdo-07/mock-services/ledger-svc
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/ledger-svc:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/ledger-svc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-fraud-detection:
    name: Build Fraud Detection
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.fraud-detection == 'true' && 
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names fraud-detection --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name fraud-detection --region ${{ env.AWS_REGION }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xbrain-learners/capstone/tf-4/cdo-07/mock-services/fraud-detection
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/fraud-detection:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/fraud-detection:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ecs:
    name: Deploy to ECS
    needs: [detect-changes, build-payment-gw, build-ledger-svc, build-fraud-detection]
    if: |
      always() && 
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') &&
      (needs.build-payment-gw.result == 'success' || 
       needs.build-ledger-svc.result == 'success' || 
       needs.build-fraud-detection.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Force new deployment (Payment GW)
        if: needs.build-payment-gw.result == 'success'
        run: |
          aws ecs update-service --cluster staging-mock-services --service payment-gw --force-new-deployment
      
      - name: Force new deployment (Ledger Svc)
        if: needs.build-ledger-svc.result == 'success'
        run: |
          aws ecs update-service --cluster staging-mock-services --service ledger-svc --force-new-deployment
      
      - name: Force new deployment (Fraud Detection)
        if: needs.build-fraud-detection.result == 'success'
        run: |
          aws ecs update-service --cluster staging-mock-services --service fraud-detection --force-new-deployment
      
      - name: Wait for deployment
        run: |
          echo "Waiting for ECS services to stabilize..."
          sleep 30
      
      - name: Smoke test
        run: |
          echo "✅ ECS services updated successfully"
          echo "Cluster: staging-mock-services"
          echo "Services: payment-gw, ledger-svc, fraud-detection"
